<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De Cosmico - Rastreo de Antenas</title>

  <!-- Leaflet (mapa libre, sin API key) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --violeta: #9c3cdc;
      --magenta: #dc28c8;
      --azul: #505fe6;
      --bg: #0d0a14;
      --panel: #161020;
      --borde: #2a2038;
      --texto: #d8d0e8;
      --dim: #8a7aa8;
    }
    html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--texto); }
    #app { display: flex; flex-direction: column; height: 100vh; }

    header {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 20px; background: var(--panel);
      border-bottom: 1px solid var(--borde);
    }
    .logo-circulo {
      width: 34px; height: 34px; border-radius: 50%;
      background: conic-gradient(from 0deg, var(--magenta), var(--violeta), var(--azul), var(--magenta));
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-circulo::after {
      content: ""; width: 12px; height: 12px; border-radius: 50%;
      background: var(--bg);
    }
    .marca { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
    .marca b { color: var(--magenta); }
    .estado { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--dim); }
    .punto-vivo { width: 9px; height: 9px; border-radius: 50%; background: #3ad13a; box-shadow: 0 0 8px #3ad13a; animation: late 1.5s infinite; }
    @keyframes late { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }

    #contenido { flex: 1; display: flex; overflow: hidden; }
    #mapa { flex: 1; background: #07060c; }

    aside {
      width: 300px; background: var(--panel); border-left: 1px solid var(--borde);
      overflow-y: auto; padding: 16px;
    }
    aside h2 { font-size: 12px; letter-spacing: 0.1em; color: var(--dim); text-transform: uppercase; margin-bottom: 12px; }

    /* ----- Responsive: en celular el mapa va arriba y la lista abajo ----- */
    @media (max-width: 760px) {
      #contenido { flex-direction: column; }
      #mapa { flex: 1 1 auto; min-height: 55vh; }
      aside {
        width: 100%; border-left: none; border-top: 1px solid var(--borde);
        max-height: 38vh; padding: 12px;
      }
      aside h2 { margin-bottom: 8px; }
      /* lista en grilla horizontal para aprovechar el ancho */
      #lista { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .marca { font-size: 15px; }
      header { padding: 10px 14px; }
      #btn-limpiar { padding: 6px 10px; font-size: 11px; margin-left: 8px; }
      .estado { font-size: 11px; }
    }
    @media (max-width: 460px) {
      #lista { grid-template-columns: 1fr; }
    }

    .tarjeta {
      background: var(--bg); border: 1px solid var(--borde); border-radius: 10px;
      padding: 14px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s;
    }
    .tarjeta:hover { border-color: var(--violeta); }
    .tarjeta .serial { font-size: 13px; font-weight: 700; color: #fff; word-break: break-all; }
    .tarjeta .coords { font-size: 12px; color: var(--azul); margin-top: 6px; font-family: monospace; }
    .tarjeta .meta { font-size: 11px; color: var(--dim); margin-top: 6px; display: flex; gap: 12px; }

    .vacio { text-align: center; color: var(--dim); font-size: 13px; padding: 30px 10px; line-height: 1.6; }

    .leaflet-popup-content { font-family: monospace; font-size: 12px; }

    #btn-limpiar {
      margin-left: 14px; padding: 7px 14px; font-size: 12px; font-weight: 600;
      font-family: inherit; cursor: pointer; color: #fff;
      background: transparent; border: 1px solid var(--violeta); border-radius: 7px;
      transition: background 0.15s;
    }
    #btn-limpiar:hover { background: var(--violeta); }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="logo-circulo"></div>
      <div class="marca"><b>De</b> Cosmico <span style="font-size:11px;color:var(--dim);font-weight:400">· Rastreo de Antenas</span></div>
      <div class="estado"><span class="punto-vivo"></span> <span id="estado-txt">Conectando...</span></div>
      <button id="btn-limpiar" title="Borrar trayectorias del mapa">Limpiar</button>
    </header>

    <div id="contenido">
      <div id="mapa"></div>
      <aside>
        <h2>Antenas Starlink</h2>
        <div id="lista"></div>
      </aside>
    </div>
  </div>

  <script>
    // Centro inicial: Neuquen, Patagonia
    const mapa = L.map("mapa").setView([-37.18, -70.66], 7);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap",
    }).addTo(mapa);

    const marcadores = {};   // serial -> L.marker
    const lineas = {};       // serial -> L.polyline
    let primeraVez = true;

    // Icono personalizado (punto de marca)
    function iconoAntena() {
      return L.divIcon({
        className: "",
        html: `<div style="width:18px;height:18px;border-radius:50%;background:#dc28c8;border:3px solid #fff;box-shadow:0 0 10px #dc28c8;"></div>`,
        iconSize: [18, 18],
        iconAnchor: [9, 9],
      });
    }

    function tiempoRelativo(iso) {
      const seg = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (seg < 60) return "hace " + seg + "s";
      if (seg < 3600) return "hace " + Math.floor(seg / 60) + "min";
      return "hace " + Math.floor(seg / 3600) + "h";
    }

    async function actualizar() {
      try {
        const r = await fetch("/api/locations");
        const data = await r.json();
        document.getElementById("estado-txt").textContent = "En linea";

        const lista = document.getElementById("lista");
        const dispositivos = data.dispositivos || [];

        if (dispositivos.length === 0) {
          lista.innerHTML = '<div class="vacio">Sin antenas reportando todavia.<br>Esperando el primer dato del dispositivo...</div>';
          return;
        }

        lista.innerHTML = "";

        dispositivos.forEach((d) => {
          // Marcador
          if (marcadores[d.serial]) {
            marcadores[d.serial].setLatLng([d.lat, d.lon]);
          } else {
            marcadores[d.serial] = L.marker([d.lat, d.lon], { icon: iconoAntena() }).addTo(mapa);
          }
          marcadores[d.serial].bindPopup(
            `<b>${d.serial}</b><br>` +
            `Lat: ${d.lat.toFixed(5)}<br>Lon: ${d.lon.toFixed(5)}<br>` +
            `Vel actual: ${d.vel != null ? d.vel.toFixed(1) + " km/h" : "?"}<br>` +
            `Vel maxima: ${d.velMax != null ? d.velMax.toFixed(1) + " km/h" : "?"}<br>` +
            `Sats: ${d.sats ?? "?"} · HDOP: ${d.hdop ?? "?"}`
          );

          // Trayectoria (historial) - se corta en saltos grandes
          const hist = (data.historial && data.historial[d.serial]) || [];
          if (hist.length > 1) {
            // Distancia aproximada en km entre dos coordenadas
            const distKm = (a, b) => {
              const R = 6371;
              const dLat = (b[0] - a[0]) * Math.PI / 180;
              const dLon = (b[1] - a[1]) * Math.PI / 180;
              const lat1 = a[0] * Math.PI / 180, lat2 = b[0] * Math.PI / 180;
              const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
              return 2 * R * Math.asin(Math.sqrt(h));
            };
            const SALTO_MAX_KM = 2; // si dos puntos seguidos estan a mas de 2km, no se unen

            // Partir el historial en segmentos continuos
            const segmentos = [];
            let seg = [[hist[0].lat, hist[0].lon]];
            for (let i = 1; i < hist.length; i++) {
              const ant = [hist[i-1].lat, hist[i-1].lon];
              const act = [hist[i].lat, hist[i].lon];
              if (distKm(ant, act) > SALTO_MAX_KM) {
                if (seg.length > 1) segmentos.push(seg);
                seg = [act];
              } else {
                seg.push(act);
              }
            }
            if (seg.length > 1) segmentos.push(seg);

            // Quitar lineas viejas y redibujar los segmentos
            if (lineas[d.serial]) {
              lineas[d.serial].forEach((l) => mapa.removeLayer(l));
            }
            lineas[d.serial] = segmentos.map((s) =>
              L.polyline(s, { color: "#9c3cdc", weight: 3, opacity: 0.7 }).addTo(mapa)
            );
          }

          // Tarjeta en la lista
          const div = document.createElement("div");
          div.className = "tarjeta";
          div.innerHTML = `
            <div class="serial">${d.serial}</div>
            <div class="coords">${d.lat.toFixed(5)}, ${d.lon.toFixed(5)}</div>
            <div class="meta">
              <span>Sats: ${d.sats ?? "?"}</span>
              <span>HDOP: ${d.hdop ?? "?"}</span>
              <span>${tiempoRelativo(d.recibido)}</span>
            </div>`;
          div.onclick = () => {
            mapa.setView([d.lat, d.lon], 15);
            marcadores[d.serial].openPopup();
          };
          lista.appendChild(div);
        });

        // La primera vez, centrar en los dispositivos
        if (primeraVez && dispositivos.length > 0) {
          primeraVez = false;
          const grupo = L.featureGroup(Object.values(marcadores));
          mapa.fitBounds(grupo.getBounds().pad(0.3));
        }
      } catch (e) {
        document.getElementById("estado-txt").textContent = "Sin conexion";
      }
    }

    // Boton limpiar: borra el historial en el servidor y limpia el mapa
    document.getElementById("btn-limpiar").onclick = async () => {
      if (!confirm("Borrar todas las trayectorias y posiciones?")) return;
      try {
        await fetch("/api/clear", { method: "POST" });
        // Limpiar capas del mapa
        Object.values(marcadores).forEach((m) => mapa.removeLayer(m));
        Object.values(lineas).forEach((arr) => {
          if (Array.isArray(arr)) arr.forEach((l) => mapa.removeLayer(l));
        });
        for (const k in marcadores) delete marcadores[k];
        for (const k in lineas) delete lineas[k];
        document.getElementById("lista").innerHTML =
          '<div class="vacio">Historial borrado.<br>Esperando nuevos datos...</div>';
      } catch (e) {
        alert("No se pudo limpiar. Reintenta.");
      }
    };

    actualizar();
    setInterval(actualizar, 5000); // refresca cada 5 segundos
  </script>
</body>
</html>
